<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="icon" type="image/png" href="images/favicon-AlexanderC_04.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page">
    <div class="container">
      <div class="column-left">
        <div class="logo-container">
          <img
            class="img-profile"
            src="images/favicon-AlexanderC_04.png"
            alt="Profile Picture bird"
          />
          <h1>AlexanderC_04</h1>
        </div>
        <p class="credits">
          Photo by <a href="https://unsplash.com/@panduior">pandu ior</a>
          on
          <a href="https://unsplash.com/">Unsplash</a>
        </p>
      </div>
      <div class="column-right">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up now
          to get started.
        </p>
        <p>You know you want to.</p>
        <form action="/" method="post">
          <div class="label-container">
            <h2 class="form-title"><strong>Let's do this! </strong></h2>
            <div>
              <label for="first-name">FIRST NAME</label
              ><input type="text" id="first-name" name="first-name" required />
            </div>
            <div>
              <label for="last-name">LAST NAME</label
              ><input type="text" id="last-name" name="last-name" required />
            </div>
            <div>
              <label for="email">EMAIL</label
              ><input type="email" id="email" name="email" required />
            </div>
            <div>
              <label for="phone">PHONE NUMBER</label>
              <input type="phone" id="phone" name="phone" required />
            </div>
            <div>
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" required />
            </div>
            <div>
              <label for="password-confirm">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="password-confirm"
                name="password-confirm"
                required
              />
            </div>
          </div>
          <button type="submit">Create Account</button>
        </form>
        <p>
          Already have an account?
          <a href="/"> Log in </a>
        </p>
      </div>
    </div>
  </body>
</html>
